<!DOCTYPE html>
<html class="light" dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>لوحة تحكم بوصلة - الإدارة المالية</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Manrope:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="icon" href="logo.jpg" type="image/jpeg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13b6ec",
                        "primary-dark": "#0e8cb5",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101d22",
                        "secondary": "#263238",
                    },
                    fontFamily: {
                        "display": ["Almarai", "sans-serif"],
                        "body": ["Almarai", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Almarai', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #13b6ec;
            border-radius: 10px;
        }

        body {
            transition: background-color 0.3s, color 0.3s;
        }

        .dark {
            color-scheme: dark;
        }

        .dark body {
            background-color: #0f171a;
            color: #e2e8f0;
        }

        .dark .bg-white {
            background-color: #1a2428;
            border-color: #2d373c;
        }

        .dark .text-secondary {
            color: #f1f5f9;
        }

        .dark .bg-gray-50 {
            background-color: #151e22;
        }

        .dark .border-gray-100 {
            border-color: #2d373c;
        }
    </style>
    <script>
        // Immediate Auth & Role Check
        const auth = sessionStorage.getItem('admin_auth');
        const role = sessionStorage.getItem('user_role');
        if (auth !== 'true') {
            window.location.replace('index.html');
        } else if (role === 'manager') {
            window.location.replace('admin.html');
        }
    </script>
    <style>
        /* Hide body until auth check completes */
        body {
            visibility: hidden;
        }
    </style>
    <script>
        if (sessionStorage.getItem('admin_auth') === 'true' && sessionStorage.getItem('user_role') === 'admin') {
            document.documentElement.style.visibility = 'visible';
            window.addEventListener('DOMContentLoaded', () => {
                document.body.style.visibility = 'visible';
            });
        }
    </script>
</head>

<body class="bg-background-light text-secondary antialiased overflow-x-hidden min-h-screen">
    <!-- Header/Nav -->
    <nav class="sticky top-0 z-50 w-full bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3">
                    <img src="logo.jpg" alt="لوجو بوصلة" class="size-11 rounded-xl object-cover shadow-sm" />
                    <div>
                        <span class="text-xl font-black tracking-tight text-secondary block leading-none">بوصلة</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Finance Dash</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="admin.html"
                        class="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 text-sm font-bold py-2.5 px-6 rounded-xl transition-all hover:bg-primary/10 hover:text-primary">
                        <span class="material-symbols-outlined text-sm">dashboard</span>
                        الطلاب
                    </a>
                    <button id="darkModeToggle"
                        class="size-11 bg-gray-100 dark:bg-gray-800 rounded-xl flex items-center justify-center text-gray-500 transition-all hover:bg-primary/10 hover:text-primary">
                        <span class="material-symbols-outlined theme-icon">dark_mode</span>
                    </button>
                    <button onclick="logout()"
                        class="size-11 bg-gray-100 dark:bg-gray-800 rounded-xl flex items-center justify-center text-gray-400 hover:text-red-500 transition-all">
                        <span class="material-symbols-outlined">logout</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
        <!-- Stats Section -->
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 md:gap-6 mb-8">
            <div
                class="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl border border-gray-100 shadow-sm flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-right gap-3 md:gap-5">
                <div
                    class="size-10 md:size-14 bg-green-100 rounded-xl md:rounded-2xl flex items-center justify-center text-green-600 shrink-0">
                    <span class="material-symbols-outlined text-xl md:text-3xl">trending_up</span>
                </div>
                <div>
                    <p class="text-gray-400 text-[10px] md:text-xs font-bold mb-0.5 md:mb-1">إجمالي الدخل</p>
                    <h3 class="text-sm md:text-2xl font-black text-secondary leading-tight" id="totalIncome">0 ج.م</h3>
                </div>
            </div>
            <div
                class="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl border border-gray-100 shadow-sm flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-right gap-3 md:gap-5">
                <div
                    class="size-10 md:size-14 bg-red-100 rounded-xl md:rounded-2xl flex items-center justify-center text-red-600 shrink-0">
                    <span class="material-symbols-outlined text-xl md:text-3xl">trending_down</span>
                </div>
                <div>
                    <p class="text-gray-400 text-[10px] md:text-xs font-bold mb-0.5 md:mb-1">إجمالي المصاريف</p>
                    <h3 class="text-sm md:text-2xl font-black text-secondary leading-tight" id="totalExpenses">0 ج.م
                    </h3>
                </div>
            </div>
            <div
                class="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl border border-gray-100 shadow-sm flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-right gap-3 md:gap-5 col-span-2 sm:col-span-1">
                <div
                    class="size-10 md:size-14 bg-blue-100 rounded-xl md:rounded-2xl flex items-center justify-center text-blue-600 shrink-0">
                    <span class="material-symbols-outlined text-xl md:text-3xl">account_balance_wallet</span>
                </div>
                <div>
                    <p class="text-gray-400 text-[10px] md:text-xs font-bold mb-0.5 md:mb-1">الصافي</p>
                    <h3 class="text-sm md:text-2xl font-black text-secondary leading-tight" id="netProfit">0 ج.م</h3>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Right Column: Add Transaction & Todo -->
            <div class="lg:col-span-1 space-y-8">
                <!-- Add Transaction Form -->
                <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">
                    <h3 class="text-lg font-black text-secondary mb-6 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">add_circle</span>
                        إضافة معاملة جديدة
                    </h3>
                    <form id="transactionForm" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-400 mb-2 block">المبلغ</label>
                            <input type="number" id="amount" required
                                class="w-full h-12 bg-gray-50 border-gray-100 rounded-2xl focus:ring-primary focus:border-primary font-bold">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 mb-2 block">النوع</label>
                            <select id="type"
                                class="w-full h-12 bg-gray-50 border-gray-100 rounded-2xl focus:ring-primary focus:border-primary font-bold">
                                <option value="income">دخل (+)</option>
                                <option value="expense">مصاريف (-)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 mb-2 block">التصنيف</label>
                            <select id="category"
                                class="w-full h-12 bg-gray-50 border-gray-100 rounded-2xl focus:ring-primary focus:border-primary font-bold">
                                <option value="إعلانات">إعلانات</option>
                                <option value="اشتراكات طلاب">اشتراكات طلاب</option>
                                <option value="رواتب">رواتب</option>
                                <option value="أدوات تقنية">أدوات تقنية</option>
                                <option value="أخرى">أخرى</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 mb-2 block">ملاحظات</label>
                            <input type="text" id="note"
                                class="w-full h-12 bg-gray-50 border-gray-100 rounded-2xl focus:ring-primary focus:border-primary font-bold">
                        </div>
                        <button type="submit" id="addTransactionBtn"
                            class="w-full h-12 bg-primary hover:bg-primary-dark text-white font-black rounded-2xl transition-all shadow-lg shadow-primary/20">
                            إضافة المعاملة
                        </button>
                    </form>
                </div>

                <!-- Todo List -->
                <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">
                    <h3 class="text-lg font-black text-secondary mb-6 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">checklist</span>
                        قائمة المهام
                    </h3>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="todoInput" placeholder="أضف مهمة جديدة..."
                            class="flex-1 h-11 bg-gray-50 border-gray-100 rounded-xl focus:ring-primary focus:border-primary font-bold text-sm">
                        <button onclick="addTodo()" id="addTodoBtn"
                            class="size-11 bg-primary text-white rounded-xl flex items-center justify-center hover:bg-primary-dark transition-all">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                    <ul id="todoList" class="space-y-3 max-h-[300px] overflow-y-auto custom-scrollbar pr-1">
                        <!-- Todos injected here -->
                    </ul>
                </div>
            </div>

            <!-- Left Column: Charts & History -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Charts Section -->
                <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">
                    <h3 class="text-lg font-black text-secondary mb-6 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">analytics</span>
                        تحليل البيانات
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="h-64">
                            <canvas id="balanceChart"></canvas>
                        </div>
                        <div class="h-64">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Transaction History -->
                <div class="bg-white rounded-2xl md:rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="p-5 md:p-6 border-b border-gray-50 flex justify-between items-center">
                        <h3 class="text-base md:text-lg font-black text-secondary flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary">history</span>
                            سجل العمليات
                        </h3>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-right min-w-[600px]">
                            <thead
                                class="bg-gray-50 border-b border-gray-100 text-[10px] font-black text-gray-500 uppercase">
                                <tr>
                                    <th class="px-4 md:px-6 py-4">التاريخ</th>
                                    <th class="px-4 md:px-6 py-4">التصنيف</th>
                                    <th class="px-4 md:px-6 py-4">الملاحظات</th>
                                    <th class="px-4 md:px-6 py-4">المبلغ</th>
                                    <th class="px-4 md:px-6 py-4"></th>
                                </tr>
                            </thead>
                            <tbody id="transactionList" class="divide-y divide-gray-50">
                                <!-- Transactions injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        if (sessionStorage.getItem('admin_auth') !== 'true') {
            window.location.href = 'index.html';
        }
        const userRole = sessionStorage.getItem('user_role') || 'manager';
        if (userRole === 'manager') {
            window.location.href = 'admin.html'; // Managers have no business here
        }

        function logout() {
            sessionStorage.removeItem('admin_auth');
            window.location.href = 'index.html';
        }

        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyBm-N7xE6djhJDb4RlPDRBTiV2_eRIWrqc",
            authDomain: "database-project-ff53b.firebaseapp.com",
            databaseURL: "https://database-project-ff53b-default-rtdb.firebaseio.com",
            projectId: "database-project-ff53b",
            storageBucket: "database-project-ff53b.appspot.com",
            messagingSenderId: "285356206299",
            appId: "1:285356206299:web:f91320c13aec1bfc7c84fe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- Dark Mode ---
        const darkModeToggle = document.getElementById('darkModeToggle');
        const html = document.documentElement;

        if (localStorage.getItem('admin-dark-mode') === 'enabled') {
            html.classList.add('dark');
        }

        darkModeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('admin-dark-mode', html.classList.contains('dark') ? 'enabled' : 'disabled');
        });

        // --- Global Data ---
        let transactions = [];
        let todos = [];

        // --- Real-time Listeners ---
        function initRealtime() {
            // Transactions Listener
            db.collection("transactions").orderBy("date", "desc").onSnapshot(snapshot => {
                transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateDashboard();
            }, err => console.error("Transactions Error:", err));

            // Todos Listener
            db.collection("finance_todos").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                todos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTodos();
            }, err => console.error("Todos Error:", err));
        }

        // --- Transactions Logic ---
        const transactionForm = document.getElementById('transactionForm');
        transactionForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('addTransactionBtn');
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;
            const note = document.getElementById('note').value;

            btn.disabled = true;
            btn.textContent = 'جاري الإضافة...';

            try {
                await db.collection("transactions").add({
                    amount,
                    type,
                    category,
                    note,
                    date: firebase.firestore.FieldValue.serverTimestamp()
                });
                transactionForm.reset();
            } catch (error) {
                console.error("Error adding transaction:", error);
                alert("حدث خطأ أثناء إضافة المعاملة");
            } finally {
                btn.disabled = false;
                btn.textContent = 'إضافة المعاملة';
            }
        });

        async function deleteTransaction(id) {
            if (confirm('هل أنت متأكد من حذف هذه المعاملة؟')) {
                try {
                    await db.collection("transactions").doc(id).delete();
                } catch (error) {
                    console.error("Error deleting transaction:", error);
                }
            }
        }

        function updateDashboard() {
            let income = 0;
            let expenses = 0;

            transactions.forEach(t => {
                if (t.type === 'income') income += t.amount;
                else expenses += t.amount;
            });

            document.getElementById('totalIncome').textContent = income.toLocaleString() + ' ج.م';
            document.getElementById('totalExpenses').textContent = expenses.toLocaleString() + ' ج.م';
            document.getElementById('netProfit').textContent = (income - expenses).toLocaleString() + ' ج.م';

            renderTransactions();
            updateCharts();
        }

        function renderTransactions() {
            const list = document.getElementById('transactionList');
            if (transactions.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-400 font-bold">لا توجد عمليات مسجلة</td></tr>';
                return;
            }

            list.innerHTML = transactions.map(t => {
                const date = t.date ? new Date(t.date.seconds * 1000).toLocaleDateString('ar-EG') : 'جاري التحميل...';
                return `
                <tr class="hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
                    <td class="px-6 py-4 text-xs font-bold text-gray-400">${date}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-gray-100 dark:bg-gray-800 rounded-full text-[10px] font-black text-gray-600 dark:text-gray-400">
                            ${t.category}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm font-bold text-secondary dark:text-white">${t.note || '--'}</td>
                    <td class="px-6 py-4 font-black ${t.type === 'income' ? 'text-green-500' : 'text-red-500'}">
                        ${t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()}
                    </td>
                    <td class="px-6 py-4 text-left">
                        <button onclick="deleteTransaction('${t.id}')" class="text-gray-300 hover:text-red-500 transition-colors">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        // --- Charts Logic ---
        let balanceChart, categoryChart;

        function updateCharts() {
            const ctx1 = document.getElementById('balanceChart').getContext('2d');
            const ctx2 = document.getElementById('categoryChart').getContext('2d');

            const income = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expenses = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);

            if (balanceChart) balanceChart.destroy();
            if (categoryChart) categoryChart.destroy();

            balanceChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['الدخل', 'المصاريف'],
                    datasets: [{
                        data: [income, expenses],
                        backgroundColor: ['#13b6ec', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Almarai', weight: 'bold' } } }
                    }
                }
            });

            const categories = {};
            transactions.forEach(t => {
                if (t.type === 'expense') {
                    categories[t.category] = (categories[t.category] || 0) + t.amount;
                }
            });

            categoryChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{
                        label: 'مصاريف حسب النوع',
                        data: Object.values(categories),
                        backgroundColor: '#263238',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false }, labels: { font: { family: 'Almarai', weight: 'bold' } } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // --- Todo List Logic ---
        async function addTodo() {
            const input = document.getElementById('todoInput');
            const btn = document.getElementById('addTodoBtn');
            const text = input.value.trim();
            if (text) {
                btn.disabled = true;
                try {
                    await db.collection("finance_todos").add({
                        text,
                        completed: false,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    input.value = '';
                } catch (error) {
                    console.error("Error adding todo:", error);
                } finally {
                    btn.disabled = false;
                }
            }
        }

        async function toggleTodo(id, currentStatus) {
            try {
                await db.collection("finance_todos").doc(id).update({
                    completed: !currentStatus
                });
            } catch (error) {
                console.error("Error updating todo:", error);
            }
        }

        async function deleteTodo(id) {
            try {
                await db.collection("finance_todos").doc(id).delete();
            } catch (error) {
                console.error("Error deleting todo:", error);
            }
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            if (todos.length === 0) {
                list.innerHTML = '<li class="text-center py-4 text-gray-400 text-xs font-bold">لا توجد مهام حالية</li>';
                return;
            }

            list.innerHTML = todos.map(t => `
                <li class="flex items-center justify-between p-3 bg-gray-50 dark:bg-white/5 rounded-xl border border-gray-100 dark:border-gray-800 transition-all ${t.completed ? 'opacity-50' : ''}">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleTodo('${t.id}', ${t.completed})" class="size-5 rounded border ${t.completed ? 'bg-primary border-primary text-white' : 'border-gray-300 dark:border-gray-600'} flex items-center justify-center">
                            ${t.completed ? '<span class="material-symbols-outlined text-[14px]">check</span>' : ''}
                        </button>
                        <span class="text-sm font-bold ${t.completed ? 'line-through text-gray-400' : 'text-secondary dark:text-white'}">${t.text}</span>
                    </div>
                    <button onclick="deleteTodo('${t.id}')" class="text-gray-300 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </button>
                </li>
            `).join('');
        }

        // Support Enter Key for Todo
        document.getElementById('todoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTodo();
            }
        });

        // Initialize Real-time updates
        initRealtime();
    </script>
</body>

</html>
